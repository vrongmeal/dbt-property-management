sources:
  - name: property_management
    database: raw
    schema: property_management
    tables:
      - name: properties
        loaded_at_field: uploaded_at
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        columns:
          - name: id
            tests:
              - not_null
              - unique
      - name: leases
        description: Records of lease agreements between tenants and units.
        loaded_at_field: uploaded_at
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: unit_id
            tests:
              - not_null
          - name: start_date
            tests:
              - not_null
      - name: units
        description: Individual rentable units belonging to properties.
        loaded_at_field: uploaded_at
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: property_id
            tests:
              - not_null
          - name: rent
            tests:
              - not_null
      - name: rental_applications
        loaded_at_field: uploaded_at
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        columns:
          - name: id
            tests:
              - not_null
              - unique
